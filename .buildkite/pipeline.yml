image: "buildkite/hosted-agent-base-images:ubuntu-jammy"

agents:
  queue: hosted

cache: ".buildkite/cache-volume"

steps:
  - name: ":go::robot_face: Lint"
    key: lint
    command: .buildkite/steps/lint.sh
    secrets:
      - MISE_GITHUB_TOKEN
    plugins:
      - mise#v1.1.2: ~

  - name: ":go::test_tube: Test"
    key: test
    command: ".buildkite/steps/test.sh"
    artifact_paths: junit-*.xml
    secrets:
      - MISE_GITHUB_TOKEN
    plugins:
      - artifacts#v1.9.4:
          upload: "cover.{html,out}"
      - mise#v1.1.2: ~

  - label: ":writing_hand: Annotate with Test Failures"
    key: annotate
    depends_on: test
    allow_dependency_failure: true
    secrets:
      - MISE_GITHUB_TOKEN
    plugins:
      - junit-annotate#v2.7.0:
          artifacts: junit-*.xml
      - mise#v1.1.2: ~
